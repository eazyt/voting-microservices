version: '3.8'

services:
  # Infrastructure Services
  redis:
    image: redis:7.2-alpine
    container_name: microservices-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass votingpass123 --appendonly yes
    volumes:
      - redis_data:/data
    # networks:
    #   - microservices-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "votingpass123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Core Services
  # users-service:
  #   build:
  #     context: ./users-service
  #     dockerfile: Dockerfile
  #   restart: unless-stopped
  #   environment:
  #     NODE_ENV: development
  #     SERVICE_NAME: users-service
  #     SERVICE_VERSION: 1.0.0
  #     MONGODB_URL: mongodb://root:example@mongodb:27017/userservice
  #     MONGODB_DB: userservice
  #     REGISTRY_URL: http://registry-service:4000
      # JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      # ENABLE_CONSOLE_TRACING: "false"
      # ENABLE_JAEGER_TRACING: "true"
      # PROMETHEUS_PORT: 9092
    # networks:
    #   - microservices-network
    # depends_on:
    #   mongodb:
    #     condition: service_healthy
    #   registry-service:
    #     condition: service_healthy
    # deploy:
    #   replicas: 1
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      SERVICE_NAME: product-service
      SERVICE_VERSION: 1.0.0
      MONGODB_URL: mongodb://root:example@localhost:27017
      MONGODB_DB: productservice
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_USERNAME: default
      REDIS_PASSWORD: votingpass123
      REGISTRY_URL: http://registry-service:4000
      # JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      # ENABLE_CONSOLE_TRACING: "false"
      # ENABLE_JAEGER_TRACING: "true"
      # PROMETHEUS_PORT: 9093
    # networks:
    #   - microservices-network
    # depends_on:
    #   mongodb:
    #     condition: service_healthy
    #   redis:
    #     condition: service_healthy
    #   registry-service:
    #     condition: service_healthy
    deploy:
      replicas: 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3


