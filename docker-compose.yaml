services:
  # Add Nginx as reverse proxy
  nginx:
    image: nginx:alpine
    container_name: microservices-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway-service
    networks:
      - microservices-network

  # Infrastructure Services
  mongo:
    image: mongo:4.4
    container_name: microservices-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: votes
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    networks:
      - microservices-network

  redis:
    image: redis:7.2-alpine
    container_name: microservices-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "votingpass123", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks:
      - microservices-network

  # Rate limiting with Redis
  redis-rate-limit:
    image: redis:7.2-alpine
    container_name: microservices-redis-rate-limit
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "ratelimitpass123", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    networks:
      - microservices-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: microservices-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
    environment:
      - COLLECTOR_ZIPKIN_HTTP_PORT=9411
      - LOG_LEVEL=info
    networks:
      - microservices-network

  # Core Services
  registry-service:
    build:
      context: ./registry
      dockerfile: Dockerfile
    container_name: microservice-registry-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SERVICE_NAME: registry-service
      SERVICE_VERSION: 1.0.0
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      ENABLE_CONSOLE_TRACING: "false"
      ENABLE_JAEGER_TRACING: "true"
      PROMETHEUS_PORT: 9091
    networks:
      - microservices-network

  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: microservice-gateway-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SERVICE_NAME: gateway-service
      SERVICE_VERSION: 1.0.0
      REGISTRY_URL: http://registry-service:4000
      REDIS_HOST: redis-rate-limit
      REDIS_PORT: 6379
      REDIS_PASSWORD: ratelimitpass123
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      ENABLE_CONSOLE_TRACING: "false"
      ENABLE_JAEGER_TRACING: "true"
      PROMETHEUS_PORT: 9094
      # Security settings
      BLACKLISTED_IPS: ""
      MAX_REQUEST_SIZE: 1048576
    networks:
      - microservices-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Resource limits for DDoS protection
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Other services remain the same...
  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SERVICE_NAME: product-service
      SERVICE_VERSION: 1.0.0
      MONGODB_URL: mongodb://root:example@mongo:27017
      MONGODB_DB: productservice
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: votingpass123
      REGISTRY_URL: http://registry-service:4000
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      ENABLE_CONSOLE_TRACING: "false"
      ENABLE_JAEGER_TRACING: "true"
      PROMETHEUS_PORT: 9093
    networks:
      - microservices-network

  users-service:
    build:
      context: ./users-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SERVICE_NAME: users-service
      SERVICE_VERSION: 1.0.0
      MONGODB_URL: mongodb://root:example@mongo:27017
      MONGODB_DB: userservice
      REGISTRY_URL: http://registry-service:4000
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      ENABLE_CONSOLE_TRACING: "false"
      ENABLE_JAEGER_TRACING: "true"
      PROMETHEUS_PORT: 9092
    networks:
      - microservices-network

  frontend-service:
    build:
      context: ./frontend-service
      dockerfile: Dockerfile
    container_name: microservice-frontend-service
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      SERVICE_NAME: frontend-service
      SERVICE_VERSION: 1.0.0
      MONGODB_URL: mongodb://root:example@mongo:27017
      MONGODB_DB: productservice
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: votingpass123
      GATEWAY_URL: http://nginx
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      ENABLE_CONSOLE_TRACING: "false"
      ENABLE_JAEGER_TRACING: "true"
      PROMETHEUS_PORT: 9096
    networks:
      - microservices-network

  worker-service:
    build:
      context: ./worker-service
      dockerfile: Dockerfile
    container_name: microservice-worker-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SERVICE_NAME: worker-service
      SERVICE_VERSION: 1.0.0
      MONGODB_URL: mongodb://root:example@mongo:27017
      MONGODB_DB: productservice
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: votingpass123
      JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      ENABLE_CONSOLE_TRACING: "false"
      ENABLE_JAEGER_TRACING: "true"
      PROMETHEUS_PORT: 9095
    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local